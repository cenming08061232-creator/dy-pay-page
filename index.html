<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>自助下单主页</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Microsoft YaHei}
body{background:#f5f7fa;padding:15px 12px}
.wrapper{max-width:460px;margin:0 auto;background:#ffffff;border-radius:18px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,0.07)}
.top-logo-bar{display:flex;align-items:center;justify-content:center;padding:22px 0;gap:10px}
.logo-block{width:58px;height:58px;background:#1677ff;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:34px;font-weight:bold}
.logo-text{font-size:24px;color:#222;font-weight:500}
.price-header{background:#1677ff;color:#fff;text-align:center;padding:26px 16px}
.price-header .tip-text{font-size:20px;font-weight:500;margin-bottom:10px}
.price-header .total-money{font-size:44px;font-weight:bold}
.price-header .order-num{font-size:13px;opacity:0.8;margin-top:8px}
.form-area{padding:22px 20px}
.form-item{margin-bottom:20px}
.form-item label{display:block;font-size:15px;color:#333;margin-bottom:8px}
.form-item label .star{color:#f53f3f}
.form-item input{width:100%;height:48px;border:1px solid #e4e7ed;border-radius:10px;padding:0 14px;font-size:16px;outline:none}
.form-item input:focus{border-color:#1677ff;box-shadow:0 0 0 2px rgba(22,119,255,0.1)}
.quantity-box{display:flex;overflow:hidden;border:1px solid #e4e7ed;border-radius:10px}
.qty-btn{width:48px;height:48px;border:none;background:#f5f7fa;font-size:22px;cursor:pointer}
.qty-minus{border-right:1px solid #e4e7ed}
.qty-plus{border-left:1px solid #e4e7ed}
.qty-input{flex:1;height:48px;border:none;text-align:center;font-size:16px}
.order-detail{padding:18px 20px;border-top:1px solid #eee;border-bottom:1px solid #eee;background:#fafafa}
.order-detail p{display:flex;justify-content:space-between;line-height:2.4;font-size:15px;color:#444}
.order-detail p span:first-child{color:#777}
.order-detail p.total-row{font-weight:bold;color:#111}
.generate-btn{width:100%;height:52px;background:#1677ff;color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:500;margin-top:16px;cursor:pointer}
.generate-btn:active{background:#0e5fd8}
.bottom-desc{text-align:center;margin-top:14px;font-size:12px;color:#999;line-height:1.7}
</style>
</head>
<body>
<div class="wrapper">
    <div class="top-logo-bar">
        <div class="logo-block">支</div>
        <div class="logo-text">支付宝自助下单</div>
    </div>
    <div class="price-header">
        <div class="tip-text">待支付余额</div>
        <div class="total-money">¥<span id="totalAmount">108.00</span></div>
        <div class="order-num">临时订单号：DD20260616001</div>
    </div>
    <div class="form-area">
        <div class="form-item">
            <label>抖音账号 <span class="star">*</span></label>
            <input type="text" id="dyAccount" placeholder="请输入抖音ID/昵称">
        </div>
        <div class="form-item">
            <label>绑定手机号（用于查询订单） <span class="star">*</span></label>
            <input type="tel" id="phoneNum" maxlength="11" placeholder="11位手机号码">
        </div>
        <div class="form-item">
            <label>购买数量（单价108元）</label>
            <div class="quantity-box">
                <button class="qty-btn qty-minus" id="subBtn">−</button>
                <input class="qty-input" id="buyNum" value="1" min="1" type="number">
                <button class="qty-btn qty-plus" id="addBtn">+</button>
            </div>
        </div>
        <div class="order-detail">
            <p><span>服务项目</span><span>抖音配套自助服务</span></p>
            <p><span>单品单价</span><span>¥108.00</span></p>
            <p><span>购买份数</span><span id="showCount">1</span></p>
            <p class="total-row"><span>应付总余额</span><span id="detailMoney">¥108.00</span></p>
        </div>
        <button class="generate-btn" id="goQrcodePage">生成付款二维码 ¥108.00</button>
        <p class="bottom-desc">演示页面仅模拟支付二维码<br>跳转二维码页面可保存图片或直接唤起支付宝</p>
    </div>
</div>

<script>
const singlePrice = 108;
const orderId = "DD20260616001";
const buyNum = document.getElementById("buyNum");
const subBtn = document.getElementById("subBtn");
const addBtn = document.getElementById("addBtn");
const totalAmount = document.getElementById("totalAmount");
const detailMoney = document.getElementById("detailMoney");
const showCount = document.getElementById("showCount");
const goQrcodePage = document.getElementById("goQrcodePage");
const dyAccount = document.getElementById("dyAccount");
const phoneNum = document.getElementById("phoneNum");

function calcAllPrice(){
    let num = parseInt(buyNum.value) || 1;
    if(num < 1) num = 1;
    buyNum.value = num;
    let total = (num * singlePrice).toFixed(2);
    totalAmount.innerText = total;
    detailMoney.innerText = `¥${total}`;
    showCount.innerText = num;
    goQrcodePage.innerText = `生成付款二维码 ¥${total}`;
}
addBtn.onclick = ()=>{buyNum.value=Number(buyNum.value)+1;calcAllPrice()};
subBtn.onclick = ()=>{let v=Number(buyNum.value);if(v>1){buyNum.value=v-1;calcAllPrice()}};
buyNum.oninput = calcAllPrice;

goQrcodePage.onclick = function(){
    const dy = dyAccount.value.trim();
    const phone = phoneNum.value.trim();
    const num = parseInt(buyNum.value);
    const total = (num * singlePrice).toFixed(2);
    if(!dy){alert("请填写抖音账号！");return;}
    if(!/^1[3-9]\d{9}$/.test(phone)){alert("请填写正确的11位手机号！");return;}
    window.location.href = `qrcode.html?dy=${encodeURIComponent(dy)}&phone=${phone}&num=${num}&total=${total}&orderId=${orderId}`;
}
calcAllPrice();
</script>
</body>
</html>
